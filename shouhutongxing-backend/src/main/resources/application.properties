# =====================================================
# 守护童行 - 留守儿童救助平台
# Spring Boot 配置文件
# =====================================================

# 服务器配置
server.port=8080
server.servlet.context-path=/api

# 应用名称
spring.application.name=shouhutongxing

# =====================================================
# 数据库配置
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/school?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JPA 配置
# =====================================================
# 显示 SQL 语句（开发环境）
spring.jpa.show-sql=true

# 数据库平台
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 自动创建/更新表结构（开发环境用 update，生产环境用 none）
spring.jpa.hibernate.ddl-auto=update

# =====================================================
# JPA 日志配置
# =====================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =====================================================
# 文件上传配置
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# =====================================================
# 静态资源配置
# =====================================================
# 允许从文件系统提供静态文件
spring.web.resources.static-locations=file:D:/bi
spring.mvc.static-path-pattern=/**

# =====================================================
# Jackson 配置（JSON 序列化）
# =====================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# =====================================================
# 日志配置
# =====================================================
logging.level.root=INFO
logging.level.com.shouhutongxing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =====================================================
# 禁用 DevTools（避免热重载问题）
# =====================================================
spring.devtools.restart.enabled=false

# =====================================================
# Swagger/OpenAPI 配置
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.shouhutongxing

# =====================================================
# 应用自定义配置
# =====================================================
# JWT 密钥（生产环境请使用环境变量）
app.jwt.secret=shouhutongxing2025secretkeymustbelongenough
app.jwt.expiration=86400000

# 文件上传路径
app.upload.path=D:/bi/uploads
