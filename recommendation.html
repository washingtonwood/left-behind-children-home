<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮扶对象推荐 - 守护童行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(234, 88, 12, 0.3); }
            50% { box-shadow: 0 0 40px rgba(234, 88, 12, 0.5); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .gradient-text {
            background: linear-gradient(135deg, #ea580c 0%, #f97316 50%, #fb923c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(234, 88, 12, 0.15);
        }
        .recommendation-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .urgency-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .filter-btn {
            transition: all 0.3s ease;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
            color: white;
            border-color: #ea580c;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'system-ui', 'sans-serif'],
                        serif: ['"Noto Serif SC"', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-gray-700 bg-gradient-to-br from-gray-50 via-orange-50/30 to-amber-50/30 min-h-screen antialiased">

    <!-- 背景装饰 -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-gradient-to-br from-primary-200/40 to-primary-300/20 rounded-full blur-3xl animate-float"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-gradient-to-tr from-amber-200/40 to-orange-300/20 rounded-full blur-3xl animate-float" style="animation-delay: -3s;"></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-4 left-4 right-4 glass-effect rounded-2xl shadow-xl z-50 animate-fade-in-up">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-600 rounded-xl flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                    </div>
                    <span class="font-serif text-xl font-bold gradient-text">守护童行</span>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="text-gray-600 hover:text-primary-600 transition-colors duration-200 font-medium">返回首页</a>
                    <a href="material-donation.html" class="bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white px-6 py-2.5 rounded-full font-medium shadow-lg transition-all duration-200">立即捐赠</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Header -->
    <section class="relative pt-36 pb-8 px-4">
        <div class="max-w-5xl mx-auto text-center relative z-10">
            <div class="animate-fade-in-up">
                <span class="inline-block px-4 py-2 bg-primary-100 text-primary-700 rounded-full text-sm font-semibold mb-6">
                    🤝 智能匹配，精准帮扶
                </span>
                <h1 class="font-serif text-5xl sm:text-6xl font-bold text-gray-900 mb-6">
                    帮扶对象推荐
                </h1>
                <p class="text-xl text-gray-600 max-w-2xl mx-auto">
                    根据您的捐赠意愿，为您推荐最需要帮助的孩子<br>
                    每一份爱心，都能点亮希望之光
                </p>
            </div>
        </div>
    </section>

    <!-- 筛选器 -->
    <section class="px-4 pb-8">
        <div class="max-w-7xl mx-auto">
            <div class="glass-effect rounded-2xl shadow-lg p-6 animate-fade-in-up delay-100">
                <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
                    </svg>
                    筛选条件
                </h3>
                <div class="grid md:grid-cols-4 gap-4">
                    <!-- 物资分类 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">物资分类</label>
                        <select id="filterCategory" class="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-primary-500/20 focus:border-primary-500 bg-white">
                            <option value="">全部分类</option>
                            <option value="衣物">衣物</option>
                            <option value="书籍">书籍</option>
                            <option value="学习用品">学习用品</option>
                            <option value="生活用品">生活用品</option>
                            <option value="体育用品">体育用品</option>
                        </select>
                    </div>
                    <!-- 家庭收入 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">家庭情况</label>
                        <select id="filterIncome" class="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-primary-500/20 focus:border-primary-500 bg-white">
                            <option value="">全部</option>
                            <option value="LOW">困难家庭</option>
                            <option value="MEDIUM">一般家庭</option>
                        </select>
                    </div>
                    <!-- 年级范围 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">年级</label>
                        <select id="filterYear" class="w-full px-4 py-2.5 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-primary-500/20 focus:border-primary-500 bg-white">
                            <option value="">全部年级</option>
                            <option value="1-3">1-3年级</option>
                            <option value="4-6">4-6年级</option>
                            <option value="1-6">全部</option>
                        </select>
                    </div>
                    <!-- 搜索按钮 -->
                    <div class="flex items-end">
                        <button onclick="applyFilters()" class="w-full bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white px-6 py-2.5 rounded-xl font-semibold shadow-lg transition-all duration-200">
                            应用筛选
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 推荐列表 -->
    <section class="px-4 pb-16">
        <div class="max-w-7xl mx-auto">
            <!-- 统计信息 -->
            <div class="flex items-center justify-between mb-6">
                <div class="text-gray-600">
                    找到 <span id="resultCount" class="font-bold text-primary-600">0</span> 位需要帮助的孩子
                </div>
                <button onclick="loadRecommendations()" class="text-primary-600 hover:text-primary-700 font-medium text-sm flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    刷新列表
                </button>
            </div>

            <!-- 加载状态 -->
            <div id="loadingState" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600"></div>
                <p class="text-gray-600 mt-4">正在加载推荐数据...</p>
            </div>

            <!-- 空状态 -->
            <div id="emptyState" class="hidden text-center py-16 glass-effect rounded-2xl">
                <svg class="w-20 h-20 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h3 class="text-xl font-semibold text-gray-700 mb-2">暂无符合条件的儿童</h3>
                <p class="text-gray-500">请尝试调整筛选条件</p>
            </div>

            <!-- 推荐卡片网格 -->
            <div id="recommendationsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 动态生成推荐卡片 -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gradient-to-br from-gray-900 to-gray-800 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400">© 2025 守护童行. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        // API 基础路径
        const API_BASE = 'http://localhost:8080/api/students';

        // 当前筛选条件
        let currentFilters = {};

        // DOM 加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            loadRecommendations();
        });

        // 加载推荐列表
        async function loadRecommendations() {
            showLoading(true);

            try {
                const params = new URLSearchParams();
                if (currentFilters.category) params.append('category', currentFilters.category);
                if (currentFilters.familyIncomeLevel) params.append('familyIncomeLevel', currentFilters.familyIncomeLevel);
                if (currentFilters.minYear) params.append('minYear', currentFilters.minYear);
                if (currentFilters.maxYear) params.append('maxYear', currentFilters.maxYear);
                if (currentFilters.gender) params.append('gender', currentFilters.gender);
                params.append('limit', 20);

                console.log('请求参数:', params.toString());

                const response = await fetch(`${API_BASE}/recommendations?${params}`);
                const result = await response.json();

                console.log('API 响应:', result);

                if (result.code === 0) {
                    displayRecommendations(result.data);
                } else {
                    showError('加载失败：' + result.message);
                }
            } catch (error) {
                console.error('加载失败:', error);
                showError('网络连接失败，请检查后端服务');
            } finally {
                showLoading(false);
            }
        }

        // 显示推荐卡片
        function displayRecommendations(students) {
            const grid = document.getElementById('recommendationsGrid');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('resultCount');

            countEl.textContent = students.length;

            if (students.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            grid.innerHTML = students.map((student, index) => {
                const level = getLevelBadge(student.recommendationLevel);
                const hasUrgent = student.familyIncomeLevel === 'LOW' ||
                               (student.urgentNeed && student.urgentNeed.includes('急需'));

                return `
                    <div class="glass-effect rounded-2xl shadow-lg p-6 card-hover relative animate-fade-in-up" style="animation-delay: ${index * 0.05}s">
                        ${level}

                        <div class="flex items-start space-x-4 mb-4">
                            <div class="w-16 h-16 bg-gradient-to-br from-primary-100 to-primary-200 rounded-2xl flex items-center justify-center flex-shrink-0">
                                <svg class="w-8 h-8 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-lg text-gray-900 truncate">${student.name}</h3>
                                <p class="text-sm text-gray-500">${student.year}年级 ${student.clazz}</p>
                                <div class="flex items-center mt-1 space-x-2">
                                    ${hasUrgent ? '<span class="urgency-badge bg-red-100 text-red-600">紧急需求</span>' : ''}
                                    <span class="text-xs text-gray-400">推荐权重: ${student.recommendationWeight}</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-gradient-to-r from-primary-50 to-amber-50 rounded-xl p-4 mb-4 border border-primary-100">
                            <p class="text-sm font-medium text-gray-800 mb-1">💡 推荐理由</p>
                            <p class="text-sm text-gray-600">${student.recommendationReason}</p>
                        </div>

                        ${student.familyCondition ? `
                            <div class="mb-4">
                                <p class="text-sm text-gray-600"><strong>家庭情况：</strong>${truncateText(student.familyCondition, 50)}</p>
                            </div>
                        ` : ''}

                        ${student.urgentNeed ? `
                            <div class="mb-4">
                                <p class="text-sm text-primary-600"><strong>紧急需求：</strong>${truncateText(student.urgentNeed, 50)}</p>
                            </div>
                        ` : ''}

                        ${student.demands && student.demands.length > 0 ? `
                            <div class="mb-4">
                                <p class="text-sm font-medium text-gray-700 mb-2">📦 需求物资</p>
                                <div class="flex flex-wrap gap-2">
                                    ${student.demands.slice(0, 3).map(d => `
                                        <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-medium">
                                            ${d.category}
                                        </span>
                                    `).join('')}
                                    ${student.demands.length > 3 ? `<span class="text-xs text-gray-400">+${student.demands.length - 3} 更多</span>` : ''}
                                </div>
                            </div>
                        ` : ''}

                        <div class="flex space-x-2">
                            <a href="material-donation.html?category=${student.demands && student.demands[0] ? student.demands[0].category : ''}" class="flex-1 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white text-center px-4 py-2.5 rounded-xl font-semibold shadow-lg transition-all duration-200">
                                立即捐赠
                            </a>
                            <button onclick="viewDetail(${student.id})" class="px-4 py-2.5 border-2 border-gray-200 hover:border-primary-500 hover:text-primary-600 rounded-xl font-semibold transition-all duration-200">
                                查看详情
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 获取推荐等级徽章
        function getLevelBadge(level) {
            const badges = {
                '非常推荐': '<span class="recommendation-badge bg-gradient-to-r from-red-500 to-orange-500 text-white shadow-lg">🔥 非常推荐</span>',
                '强烈推荐': '<span class="recommendation-badge bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-lg">⭐ 强烈推荐</span>',
                '推荐': '<span class="recommendation-badge bg-gradient-to-r from-primary-500 to-primary-400 text-white shadow-md">✓ 推荐</span>',
                '可以考虑': '<span class="recommendation-badge bg-gray-200 text-gray-600">可以考虑</span>',
                '暂不推荐': '<span class="recommendation-badge bg-gray-100 text-gray-400">暂不推荐</span>'
            };
            return badges[level] || '';
        }

        // 截断文本
        function truncateText(text, maxLength) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        // 应用筛选
        function applyFilters() {
            const category = document.getElementById('filterCategory').value;
            const income = document.getElementById('filterIncome').value;
            const year = document.getElementById('filterYear').value;

            currentFilters = {
                category: category || null,
                familyIncomeLevel: income || null
            };

            // 解析年级范围
            if (year) {
                if (year === '1-3') {
                    currentFilters.minYear = 1;
                    currentFilters.maxYear = 3;
                } else if (year === '4-6') {
                    currentFilters.minYear = 4;
                    currentFilters.maxYear = 6;
                } else if (year === '1-6') {
                    currentFilters.minYear = 1;
                    currentFilters.maxYear = 6;
                }
            } else {
                delete currentFilters.minYear;
                delete currentFilters.maxYear;
            }

            console.log('应用筛选:', currentFilters);
            loadRecommendations();
        }

        // 查看详情
        function viewDetail(id) {
            console.log('查看详情，id=', id);
            // TODO: 打开详情弹窗或跳转到详情页
            alert('详情页开发中...');
        }

        // 显示/隐藏加载状态
        function showLoading(show) {
            document.getElementById('loadingState').classList.toggle('hidden', !show);
            document.getElementById('recommendationsGrid').classList.toggle('hidden', show);
        }

        // 显示错误
        function showError(message) {
            const grid = document.getElementById('recommendationsGrid');
            grid.innerHTML = `
                <div class="col-span-full text-center py-16">
                    <svg class="w-20 h-20 text-red-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="text-xl font-semibold text-gray-700 mb-2">加载失败</h3>
                    <p class="text-gray-500">${message}</p>
                </div>
            `;
        }
    </script>

</body>
</html>
